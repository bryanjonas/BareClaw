# Secrets file example.
# This directory serves two purposes — both use the same format:
#
# 1. Provider API keys (secrets/<provider-id>.yaml)
#    Filename must match a provider id in config.yaml providers:.
#    The api_key value is loaded automatically at startup.
#    Example — secrets/openai.yaml:
#
#      api_key: "sk-..."
#
# 2. Superpower secrets (secrets/<superpower-id>.yaml)
#    Filename must match the id in superpowers/<id>.yaml.
#    Keys are interpolated into bootstrap_prompt and injected into system prompts.
#    Example — secrets/homeassistant.yaml:
#
#      token: "your-long-lived-token"
#
# IMPORTANT: All files in this directory are gitignored (except this example).
# Consider setting file permissions to 600: chmod 600 secrets/<id>.yaml

token: "your-api-token-here"
# api_key: "sk-..."   # OpenAI API keys: https://platform.openai.com/api-keys
