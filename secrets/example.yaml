# Secrets file example.
# Copy this file to secrets/<superpower-id>.yaml and set real values.
# The filename must match the id in the corresponding superpowers/<id>.yaml.
#
# IMPORTANT: This file is gitignored. Never commit real secrets.
# Consider setting file permissions to 600: chmod 600 secrets/<id>.yaml
#
# Format: flat key: value pairs.
# Keys are referenced in bootstrap_prompt and injected into system prompts as-is.

token: "your-api-token-here"
