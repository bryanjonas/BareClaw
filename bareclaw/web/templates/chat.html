{% extends "base.html" %}
{% block title %}Chat — Bareclaw{% endblock %}

{% block head %}
<style>
  main { padding: 0; max-width: 100%; }

  .chat-layout {
    display: flex;
    height: calc(100vh - 48px);
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1rem;
    gap: .5rem;
    flex-shrink: 0;
  }
  .sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
  .agent-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    text-align: left;
    padding: .5rem .6rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 12px;
    transition: all .15s;
  }
  .agent-btn:hover { border-color: var(--accent); color: var(--text); }
  .agent-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1840; }
  .agent-btn .model { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; }
  .agent-btn .tools { display: block; font-size: 10px; color: #64b5f6; margin-top: 2px; }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .message {
    display: flex;
    gap: .75rem;
    max-width: 820px;
  }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-role {
    font-size: 11px;
    color: var(--muted);
    min-width: 60px;
    text-align: right;
    padding-top: 2px;
    flex-shrink: 0;
  }
  .message.user .msg-role { text-align: left; color: var(--accent); }

  .msg-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .6rem .9rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .message.user .msg-body {
    background: #1a1840;
    border-color: var(--accent);
  }

  .msg-body code { font-size: 12px; }
  .msg-body pre { margin: .5rem 0; }

  .typing-indicator {
    display: none;
    color: var(--muted);
    font-size: 12px;
    padding: 0 1.5rem .5rem;
  }
  .typing-indicator.visible { display: block; }

  .input-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: .75rem 1.5rem;
    display: flex;
    gap: .75rem;
    align-items: flex-end;
  }

  #msg-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .6rem .9rem;
    border-radius: 6px;
    font-family: var(--font);
    font-size: 13px;
    resize: none;
    min-height: 40px;
    max-height: 160px;
    outline: none;
    line-height: 1.5;
  }
  #msg-input:focus { border-color: var(--accent); }

  #send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: .6rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    align-self: flex-end;
    transition: background .15s;
  }
  #send-btn:hover { background: var(--accent-dim); }
  #send-btn:disabled { opacity: .5; cursor: not-allowed; }

  #status-bar {
    font-size: 11px;
    color: var(--muted);
    padding: .25rem 1.5rem;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  #status-bar .connected { color: #4caf50; }
  #status-bar .disconnected { color: #f44336; }
</style>
{% endblock %}

{% block content %}
<div class="chat-layout">
  <aside class="sidebar">
    <h2>Agents</h2>
    {% for agent in agents %}
    <button class="agent-btn {% if agent.id == default_agent %}active{% endif %}"
            data-agent="{{ agent.id }}"
            onclick="selectAgent(this)">
      {{ agent.name }}
      <span class="model">{{ agent.model }}</span>
      {% if agent.tools %}
      <span class="tools">{{ agent.tools | join(', ') }}</span>
      {% endif %}
    </button>
    {% endfor %}
  </aside>

  <div class="chat-area">
    <div id="messages"></div>
    <div class="typing-indicator" id="typing">thinking...</div>

    <div class="input-bar">
      <textarea id="msg-input" placeholder="Message..." rows="1"
                onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <div id="status-bar">
      <span id="conn-status" class="disconnected">connecting...</span>
    </div>
  </div>
</div>

<script>
  const DEFAULT_AGENT = "{{ default_agent }}";
  let currentAgent = DEFAULT_AGENT;
  let ws = null;
  let isWaiting = false;
  let currentMsgEl = null;

  const WS_TOKEN = "{{ ws_token }}";

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/chat?token=${encodeURIComponent(WS_TOKEN)}`);

    ws.onopen = () => {
      document.getElementById("conn-status").textContent = "connected";
      document.getElementById("conn-status").className = "connected";
    };

    ws.onclose = () => {
      document.getElementById("conn-status").textContent = "disconnected — retrying...";
      document.getElementById("conn-status").className = "disconnected";
      setTimeout(connect, 2000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.error) {
        appendMessage("system", `Error: ${data.error}`);
        setWaiting(false);
        return;
      }
      if (data.chunk !== undefined) {
        if (!currentMsgEl) {
          currentMsgEl = appendMessage("assistant", "");
        }
        currentMsgEl.querySelector(".msg-body").textContent += data.chunk;
        scrollBottom();
      }
      if (data.done) {
        currentMsgEl = null;
        setWaiting(false);
      }
    };
  }

  function selectAgent(btn) {
    document.querySelectorAll(".agent-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentAgent = btn.dataset.agent;
  }

  function appendMessage(role, text) {
    const msgs = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="msg-role">${role}</div>
      <div class="msg-body">${escapeHtml(text)}</div>
    `;
    msgs.appendChild(div);
    scrollBottom();
    return div;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function scrollBottom() {
    const msgs = document.getElementById("messages");
    msgs.scrollTop = msgs.scrollHeight;
  }

  function setWaiting(v) {
    isWaiting = v;
    document.getElementById("send-btn").disabled = v;
    document.getElementById("msg-input").disabled = v;
    document.getElementById("typing").className = v ? "typing-indicator visible" : "typing-indicator";
    if (!v) scrollBottom();
  }

  function sendMessage() {
    const input = document.getElementById("msg-input");
    const text = input.value.trim();
    if (!text || isWaiting || !ws || ws.readyState !== WebSocket.OPEN) return;

    appendMessage("user", text);
    input.value = "";
    autoResize(input);
    setWaiting(true);
    currentMsgEl = null;

    ws.send(JSON.stringify({ agent: currentAgent, message: text }));
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  connect();
</script>
{% endblock %}
