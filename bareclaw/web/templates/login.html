<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — Bareclaw</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --accent: #7c6af7; --text: #e0e0e0; --muted: #888;
      --error: #f44336;
      --font: "JetBrains Mono", "Fira Code", monospace;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 14px;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
    }
    .box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 2rem; width: 320px;
    }
    .logo {
      font-size: 1.4rem; font-weight: 700; color: var(--accent);
      letter-spacing: .05em; margin-bottom: 1.5rem; display: block;
    }
    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: .3rem; }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: .5rem .7rem; border-radius: 4px;
      font-family: var(--font); font-size: 13px; margin-bottom: 1rem;
      outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%; background: var(--accent); color: #fff; border: none;
      padding: .6rem; border-radius: 4px; cursor: pointer;
      font-family: var(--font); font-size: 13px; font-weight: 600;
    }
    button:hover { opacity: .9; }
    .error {
      background: #3a1a1a; border: 1px solid #f44336;
      color: #f44336; border-radius: 4px; padding: .5rem .7rem;
      font-size: 12px; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <span class="logo">bareclaw</span>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label for="api_key">API Key</label>
      <input type="password" id="api_key" name="api_key" placeholder="Enter your API key" autofocus>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
