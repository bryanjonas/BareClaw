services:
  bareclaw:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./agents:/app/agents
      - ./crons:/app/crons
      - ./webhooks_config:/app/webhooks_config
      - ./data:/app/data
      - ./memories:/app/memories
      - ./superpowers:/app/superpowers
      - ./secrets:/app/secrets
      - ./workspace:/root/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
